name: Deploy ai007.agency to Selectel S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: selectel-s3-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_EC2_METADATA_DISABLED: true
  AWS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
  AWS_DEFAULT_REGION: ${{ vars.SELECTEL_S3_REGION }}
  AWS_REGION: ${{ vars.SELECTEL_S3_REGION }}
  SELECTEL_S3_BUCKET: ${{ vars.SELECTEL_S3_BUCKET }}
  SELECTEL_S3_ENDPOINT_URL: ${{ vars.SELECTEL_S3_ENDPOINT }}

jobs:
  deploy:
    name: Sync static files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Upload to Selectel S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SELECTEL_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SELECTEL_S3_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync . "s3://${SELECTEL_S3_BUCKET}" \
            --endpoint-url "${SELECTEL_S3_ENDPOINT_URL}" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --cache-control "no-cache, max-age=0, must-revalidate" \
            --only-show-errors
