name: Deploy ai007.agency to Selectel S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: selectel-s3-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_EC2_METADATA_DISABLED: true
  AWS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
  AWS_DEFAULT_REGION: ${{ vars.SELECTEL_S3_REGION }}
  AWS_REGION: ${{ vars.SELECTEL_S3_REGION }}
  SELECTEL_S3_BUCKET: ${{ vars.SELECTEL_S3_BUCKET }}
  SELECTEL_S3_ENDPOINT_URL: ${{ vars.SELECTEL_S3_ENDPOINT }}

jobs:
  deploy:
    name: Sync static files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate sitemap.xml (auto lastmod + discover pages)
        run: |
          DATE=$(date -u +%Y-%m-%d)
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
            echo "  <url><loc>https://ai007.agency/</loc><lastmod>${DATE}</lastmod><changefreq>weekly</changefreq><priority>1.0</priority></url>"
            for f in *.html; do
              case "$f" in index.html|presentation.html|preview_*|*МАКЕТ*) continue;; esac
              echo "  <url><loc>https://ai007.agency/${f}</loc><lastmod>${DATE}</lastmod><changefreq>monthly</changefreq><priority>0.6</priority></url>"
            done
            echo '</urlset>'
          } > sitemap.xml
          echo "sitemap.xml пересобран:"; cat sitemap.xml

      - name: Upload to Selectel S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SELECTEL_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SELECTEL_S3_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync . "s3://${SELECTEL_S3_BUCKET}" \
            --endpoint-url "${SELECTEL_S3_ENDPOINT_URL}" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --cache-control "no-cache, max-age=0, must-revalidate" \
            --only-show-errors
